<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoLocate - Docs</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      line-height: 1.6;
      overflow-x: hidden;
    }

    nav {
      background: rgba(26, 26, 26, 1);
      padding: 16px 0;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #dc2626;
      font-size: 1.25rem;
      font-weight: 700;
      transition: color 0.2s;
    }

    .logo:hover { color: #ef4444; }
    .logo img { width: 28px; height: 28px; border-radius: 6px; }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 32px;
      align-items: center;
    }

    .nav-links a {
      color: #999;
      text-decoration: none;
      transition: color 0.2s ease;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .nav-links a:hover { color: #ffffff; }
    .nav-links a.active { color: #ffffff; text-decoration: underline; }

    .nav-icons { display: flex; gap: 16px; align-items: center; }

    .nav-icon {
      width: 28px;
      height: 28px;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
      color: #e8eaed;
    }

    .nav-icon:hover { opacity: 1; transform: translateY(-2px); }

    /* Page header */
    .page-header {
      max-width: 1280px;
      margin: 0 auto;
      padding: 120px 32px 20px;
      text-align: center;
    }

    .page-header h1 {
      font-size: 3rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .page-header p {
      font-size: 1.1rem;
      color: #999;
      max-width: 560px;
      margin: 0 auto 24px;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.25);
      color: #ef4444;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 48px;
    }

    /* Tab switcher */
    .tab-bar {
      max-width: 860px;
      margin: 0 auto 32px;
      padding: 0 32px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #888;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }

    .tab-btn.active {
      background: rgba(220, 38, 38, 0.12);
      border-color: rgba(220, 38, 38, 0.35);
      color: #ef4444;
    }

    /* Install card */
    .install-wrapper {
      max-width: 700px;
      margin: 0 auto 80px;
      padding: 0 32px;
    }

    .install-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .browser-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #222;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .card-header-text h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
    }

    .card-header-text p {
      font-size: 0.875rem;
      color: #666;
      margin-top: 3px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step {
      display: flex;
      gap: 16px;
      position: relative;
    }

    /* Vertical connector line */
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 12px;
      top: 28px;
      bottom: -12px;
      width: 2px;
      background: rgba(220, 38, 38, 0.15);
    }

    .step-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .step-num {
      width: 26px;
      height: 26px;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.35);
      color: #ef4444;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      z-index: 1;
      position: relative;
    }

    .step-body {
      flex: 1;
      padding-bottom: 24px;
    }

    .step:last-child .step-body {
      padding-bottom: 0;
    }

    .step-body strong {
      display: block;
      font-size: 0.975rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 5px;
    }

    .step-body p {
      font-size: 0.875rem;
      color: #888;
      line-height: 1.65;
    }

    .step-body a {
      color: #ef4444;
      text-decoration: none;
      font-weight: 500;
    }

    .step-body a:hover { text-decoration: underline; }

    .pill-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #ef4444 !important;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      margin: 2px 2px 0 0;
      text-decoration: none !important;
      transition: background 0.2s;
    }

    .pill-link:hover {
      background: rgba(239, 68, 68, 0.2) !important;
      text-decoration: none !important;
    }

    .inline-ui {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ddd;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      font-family: inherit;
    }

    .tip-box {
      display: flex;
      gap: 10px;
      background: rgba(255, 200, 0, 0.05);
      border: 1px solid rgba(255, 200, 0, 0.15);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.84rem;
      color: #aaa;
      line-height: 1.55;
      margin-top: 8px;
    }

    .tip-box .tip-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    .install-btn {
      background: #dc2626;
      color: #ffffff;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .install-btn:hover {
      background: #ef4444;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(220, 38, 38, 0.35);
    }

    .note-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.84rem;
      color: #777;
      line-height: 1.55;
    }

    .note-box strong { color: #aaa; }

    footer {
      text-align: center;
      padding: 48px 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    footer p { color: #555; font-size: 0.875rem; }

    /* Hamburger button */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-around;
      width: 28px;
      height: 24px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 1010;
    }

    .hamburger span {
      width: 28px;
      height: 2px;
      background: #e0e0e0;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    /* Sidebar */
    .mobile-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: #1e1e1e;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 2000;
      padding: 24px 0;
      overflow-y: auto;
      box-shadow: 4px 0 20px rgba(0,0,0,0.3);
    }

    .mobile-sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      display: flex;
      justify-content: flex-end;
      padding: 0 20px 20px;
    }

    .sidebar-close {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      line-height: 1;
      transition: color 0.2s;
    }

    .sidebar-close:hover {
      color: #fff;
    }

    .sidebar-nav {
      list-style: none;
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-nav a {
      display: block;
      padding: 16px 24px;
      color: #e0e0e0;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }

    .sidebar-nav a:hover {
      background: rgba(220, 38, 38, 0.1);
      color: #fff;
    }

    /* Overlay when sidebar is open */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    @media (max-width: 600px) {
      .page-header h1 { font-size: 2rem; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .nav-container { padding: 0 20px; }
      .install-card { padding: 28px 20px; }
    }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
  </style>
</head>
